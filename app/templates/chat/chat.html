{% extends "base.html" %}
{% block title %}Tutor | Ratio{% endblock %}

{% block content %}
<div class="chat-container">
  <div class="chat-thread" id="chatThread">
    <div class="chat-message chat-message--system">
      Welcome! Paste an LSAT question, share your answer, or describe what you're struggling with.
      I'll give you a structured breakdown of how to think through it.
    </div>
  </div>

  <form class="chat-form" id="chatForm">
    <textarea
      class="chat-input"
      id="chatInput"
      name="message"
      placeholder="Paste an LSAT question or describe what you need help with..."
      rows="3"
      required
    ></textarea>
    <button class="btn btn--primary" type="submit" id="sendBtn">Send</button>
  </form>

  <div class="chat-meta">
    <span id="quotaLabel" class="chat-quota"></span>
    <form method="POST" action="{{ url_for('chat.clear_history') }}" style="display:inline;">
      <button class="btn btn--ghost btn--sm" type="submit">Clear History</button>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/marked@15.0.12/marked.min.js" integrity="sha384-948ahk4ZmxYVYOc+rxN1H2gM1EJ2Duhp7uHtZ4WSLkV4Vtx5MUqnV+l7u9B+jFv+" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.4.8/dist/purify.min.js" integrity="sha384-jrsBdrv4eDpEYIq32u13DPbvB6tRmqIDnA6UlgFBoexpetaiWi7g/VbfMEL1WVen" crossorigin="anonymous"></script>
<script src="{{ url_for('static', filename='js/chat.js') }}"></script>
{% endblock %}
