{% extends "base.html" %}
{% block title %}Log In | Ratio{% endblock %}

{% block content %}
<div class="form-card">
  <div class="form-card__logo">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 28" height="28" aria-label="Ratio">
      <line x1="14" y1="7" x2="14" y2="21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="10" y1="21" x2="18" y2="21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="4" y1="7" x2="24" y2="7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M4,7 Q1,12 4,16 H10 Q13,12 10,7" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
      <path d="M18,7 Q15,12 18,16 H24 Q27,12 24,7" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
      <text x="32" y="19" font-family="'Source Serif 4',Georgia,serif" font-size="16" font-weight="700" fill="currentColor" letter-spacing="-0.02em">ratio</text>
    </svg>
  </div>
  <h1 class="form-card__title">Log In</h1>

  {% for error in errors %}
    <p class="form-error">{{ error }}</p>
  {% endfor %}

  <form method="POST" action="{{ url_for('auth.login') }}">
    <label class="form-label" for="email">Email</label>
    <input class="form-input" type="email" id="email" name="email" required autocomplete="email">

    <label class="form-label" for="password">Password</label>
    <input class="form-input" type="password" id="password" name="password" required autocomplete="current-password">

    <button class="btn btn--primary" type="submit">Log In</button>
  </form>

  <p class="form-card__footer">Don't have an account? <a href="{{ url_for('auth.register') }}">Register</a></p>
</div>
{% endblock %}
